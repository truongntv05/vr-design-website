  <body>
    <!-- HEADER -->
    <header class="header">

      <img src="./img/logo3.png" alt="company logo" class="logo3" />

        </h1>
        <p>Thiết kế đẳng cấp - Không gian khác biệt</p>
        <button
          onclick="document.getElementById('projects').scrollIntoView()"
          class="btn"
        >
          Xem dự án
        </button>
      </div>

    <!-- ABOUT -->
    <div id="about"></div>

    <!-- SERVICES -->
    <div id="service"></div>

    <!-- PROJECTS -->
    <div id="projects"></div>

    <!-- CONTACT -->
