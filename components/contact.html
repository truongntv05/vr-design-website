<section class="section form-section">
  <h2>Đặt lịch tư vấn</h2>

  <form class="form-pro">
    <div class="form-row">
      <input type="text" placeholder="Họ và tên" required />
      <input type="tel" placeholder="Số điện thoại" required />
    </div>

    <div class="form-row">
      <input type="email" placeholder="Email" />
      <input type="text" placeholder="Địa điểm xây dựng" />
    </div>

    <div class="form-row">
      <select>
        <option>Loại công trình</option>
        <option>Nhà phố</option>
        <option>Biệt thự</option>
        <option>Nhà vườn</option>
        <option>Nội thất</option>
      </select>

      <select>
        <option>Ngân sách</option>
        <option>Dưới 500 triệu</option>
        <option>500 triệu - 1 tỷ</option>
        <option>1 - 3 tỷ</option>
        <option>Trên 3 tỷ</option>
      </select>
    </div>

    <textarea placeholder="Mô tả yêu cầu..."></textarea>

    <button type="submit" class="btn gold-btn">Gửi yêu cầu tư vấn</button>
  </form>
</section>
